openapi: 3.0.3
info:
  title: Test Task Swagger
  version: 1.0.0
servers:
  - url: http://localhost:80
paths:
  /subscriptions:
    post:
      tags: ["Подписки"]
      summary: Создать запись о подписке
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, price, user_id, start_at]
              properties:
                name:
                  type: string
                  example: "Yandex Plus"
                price:
                  type: integer
                  example: 399
                user_id:
                  type: string
                  example: "60601fee-2bf1-4721-ae6f-7636e79a0cba"
                start_date:
                  type: string
                  format: string
                  example: "01-2026"
                end_date:
                  type: string
                  format: string
                  example: "02-2026"
      responses:
        '201':
          description: Успешное создание
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Subscription'
        '400':
          description: Ответ с ошибкой
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags: ["Подписки"]
      summary: Получить список подписок
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: true
          schema:
            type: integer
            example: 10
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionsResponse'
        '400':
          description: Ответ с ошибкой
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /subscriptions/{id}:
    get:
      tags: ["Подписки"]
      summary: Получить подписку
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '400':
          description: Ответ с ошибкой
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Объект не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: ["Подписки"]
      summary: Изменить запись подписки
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "Yandex Plus"
                price:
                  type: integer
                  example: 399
                user_id:
                  type: string
                  example: "60601fee-2bf1-4721-ae6f-7636e79a0cba"
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '204':
          description: Контент не найден
        '400':
          description: Ответ с ошибкой
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Объект не найден
    delete:
      tags: ["Подписки"]
      summary: Удалить запись о подписке
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Успешный ответ
  /subscriptions/stats:
    get:
      tags: ["Подписки"]
      summary: Статистика суммарной стоимости
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
            example: "Yandex Plus"
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            example: "60601fee-2bf1-4721-ae6f-7636e79a0cba"
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            example: "01-2026"
        - name: stop_date
          in: query
          required: true
          schema:
            type: string
            example: "01-2026"
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: integer
                    example: 3999
                    description: Сумма
        '400':
          description: Ответ с ошибкой
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: Описание ошибки
    SubscriptionResponse:
      $ref: '#/components/schemas/Subscription'
    SubscriptionsResponse:
      type: object
      properties:
        total:
          type: integer
          description: Всего объектов
          example: 100
        page:
          type: integer
          description: Текущая страница
          example: 1
        limit:
          type: integer
          description: Кол-во объектов на странице
          example: 10
        items:
          type: array
          items:
            $ref: '#/components/schemas/Subscription'

    Subscription:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Yandex Plus"
        price:
          type: integer
          example: 399
        user_id:
          type: string
          example: "60601fee-2bf1-4721-ae6f-7636e79a0cba"
        start_date:
          type: string
          format: string
          example: "01-2026"
        end_date:
          type: string
          format: string
          example: "02-2026"
